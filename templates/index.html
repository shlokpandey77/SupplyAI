<!DOCTYPE html>
<html>
<head>
    <title>SmartSupply AI</title>

    <style>
        body {
            background-color: #0f172a;
            color: #e2e8f0;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
        }

        .card {
            background-color: #1e293b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.5);
        }

        .high {
            border-left: 5px solid red;
        }

        .medium {
            border-left: 5px solid orange;
        }
    </style>
</head>

<body>

<h1>🚚 SmartSupply AI Dashboard</h1>

{% for alert in alerts %}
<div class="card {{ alert.risk|lower }}">
    <h2>📍 {{ alert.location }}</h2>
    <p>⏱ Delay: {{ alert.delay }} mins</p>
    <p>🌦 Weather: {{ alert.weather }}</p>
    <p>⚠ Risk: {{ alert.risk }}</p>
    <p>✅ Solution: {{ alert.solution }}</p>
</div>
{% endfor %}

</body>
</html>
